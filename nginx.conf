# comedy.moscow nginx config
# Place at /etc/nginx/sites-available/comedy.moscow and symlink to sites-enabled

# Redirect www → apex (SEO: prevent duplicate content)
server {
    listen 80;
    server_name www.comedy.moscow;
    return 301 https://comedy.moscow$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.comedy.moscow;
    ssl_certificate     /etc/letsencrypt/live/comedy.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comedy.moscow/privkey.pem;
    return 301 https://comedy.moscow$request_uri;
}

# Main site
server {
    listen 80;
    server_name comedy.moscow;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name comedy.moscow;

    ssl_certificate     /etc/letsencrypt/live/comedy.moscow/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comedy.moscow/privkey.pem;

    # Security headers (reinforced at app level via next.config.mjs)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
